name: Deploy to Lightsail

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  AWS_REGION: us-east-1
  IMAGE: ghcr.io/hg-gits-it/picture-sorter

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::458302835574:role/github-lightsail-deployment
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Find managed instance
        id: ssm
        run: |
          INSTANCE_ID=$(aws ssm describe-instance-information \
            --filters "Key=ResourceType,Values=ManagedInstance" "Key=PingStatus,Values=Online" \
            --query "InstanceInformationList[?Name=='picture-sorter'].InstanceId | [0]" \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "ERROR: No online managed instance found"
            exit 1
          fi

          echo "instance-id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "Found instance: $INSTANCE_ID"

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.ssm.outputs.instance-id }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy from GitHub Actions" \
            --timeout-seconds 300 \
            --parameters commands='["echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u gha --password-stdin && docker pull ${{ env.IMAGE }}:latest && docker stop picture-sorter || true && docker rm picture-sorter || true && docker run -d --name picture-sorter --restart unless-stopped -p 3001:3001 --env-file /mnt/data/.env.production -v /mnt/data:/app/data -v /mnt/data/photos:/app/photos ${{ env.IMAGE }}:latest && docker image prune -f"]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Poll for completion
          for i in $(seq 1 30); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ steps.ssm.outputs.instance-id }}" \
              --query "Status" \
              --output text 2>/dev/null || echo "InProgress")

            echo "Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ steps.ssm.outputs.instance-id }}" \
                --query "[StandardOutputContent,StandardErrorContent]" \
                --output text
              exit 1
            fi
          done

          echo "ERROR: Timed out waiting for deploy to complete"
          exit 1
