name: Manage Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: Stack action
        required: true
        type: choice
        options:
          - create
          - delete
      CreateNewDisk:
        description: Create a new data disk? (yes for first time, no to reattach existing)
        required: true
        type: choice
        default: 'no'
        options:
          - 'yes'
          - 'no'

env:
  STACK_NAME: picture-sorter
  AWS_REGION: us-east-1
  SSM_ROLE_NAME: picture-sorter-ssm-agent

permissions:
  id-token: write
  contents: read

jobs:
  manage-stack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::458302835574:role/github-lightsail-deployment
          aws-region: ${{ env.AWS_REGION }}

      - name: Create SSM activation
        if: inputs.action == 'create'
        id: ssm
        run: |
          ROLE_ARN=$(aws iam get-role \
            --role-name $SSM_ROLE_NAME \
            --query "Role.Arn" \
            --output text)

          ACTIVATION=$(aws ssm create-activation \
            --iam-role $SSM_ROLE_NAME \
            --default-instance-name picture-sorter \
            --registration-limit 1 \
            --region $AWS_REGION \
            --output json)

          echo "activation-id=$(echo $ACTIVATION | jq -r '.ActivationId')" >> "$GITHUB_OUTPUT"
          echo "activation-code=$(echo $ACTIVATION | jq -r '.ActivationCode')" >> "$GITHUB_OUTPUT"
          echo "SSM activation created"

      - name: Create stack
        if: inputs.action == 'create'
        run: |
          aws cloudformation create-stack \
            --stack-name $STACK_NAME \
            --template-body file://infra/template.yml \
            --parameters \
              ParameterKey=GhcrToken,ParameterValue="${{ secrets.GHCR_TOKEN }}" \
              ParameterKey=CreateNewDisk,ParameterValue="${{ inputs.CreateNewDisk }}" \
              ParameterKey=DiskName,ParameterValue=picture-sorter-data \
              ParameterKey=SsmActivationId,ParameterValue="${{ steps.ssm.outputs.activation-id }}" \
              ParameterKey=SsmActivationCode,ParameterValue="${{ steps.ssm.outputs.activation-code }}"

          echo "Waiting for stack creation to complete..."
          aws cloudformation wait stack-create-complete --stack-name $STACK_NAME

          echo "=== Stack created ==="
          STATIC_IP=$(aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].Outputs[?OutputKey=='StaticIpAddress'].OutputValue" \
            --output text)
          echo "Static IP: $STATIC_IP"
          echo "Visit http://$STATIC_IP to access the app."
          echo "Shell access: aws ssm start-session --target <instance-id>"

      - name: Deregister managed instance
        if: inputs.action == 'delete'
        run: |
          INSTANCE_ID=$(aws ssm describe-instance-information \
            --filters "Key=ResourceType,Values=ManagedInstance" \
            --query "InstanceInformationList[?Name=='picture-sorter'].InstanceId | [0]" \
            --output text)

          if [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ]; then
            aws ssm deregister-managed-instance --instance-id "$INSTANCE_ID"
            echo "Deregistered managed instance: $INSTANCE_ID"
          fi

      - name: Delete stack
        if: inputs.action == 'delete'
        run: |
          aws cloudformation delete-stack --stack-name $STACK_NAME

          echo "Waiting for stack deletion to complete..."
          aws cloudformation wait stack-delete-complete --stack-name $STACK_NAME

          echo "=== Stack deleted ==="
          echo "The data disk (picture-sorter-data) has been retained."
          echo "To reuse it next season, create the stack with CreateNewDisk=no."
